name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: pixi run -e default cargo fmt --all -- --check
      - name: cargo clippy
        run: pixi run -e default cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo test
        run: pixi run -e default cargo test --workspace --all-features
      - name: pytest
        run: pixi run test

  platform:
    name: Tests (${{ matrix.os }})
    if: github.ref == 'refs/heads/main' || github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: pixi run -e default cargo test --workspace --all-features
      - name: pytest
        run: pixi run test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
      - name: Run coverage
        run: pixi run coverage
