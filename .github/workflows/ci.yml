name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
      - name: cargo fmt
        run: pixi run -e default cargo fmt --all -- --check
      - name: cargo clippy
        run: pixi run -e default cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo test
        run: pixi run -e default cargo test --workspace --all-features

  python:
    name: Python bindings tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
      - name: pytest
        run: pixi run test

  coverage:
    name: Coverage (Rust + Python)
    runs-on: ubuntu-latest
    needs:
      - rust
      - python
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
      - name: Run coverage
        run: pixi run coverage
