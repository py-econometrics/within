name: Cargo Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-schwarz-precond:
    name: Publish schwarz-precond
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish schwarz-precond
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "schwarz-precond") | .version')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/schwarz-precond/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "schwarz-precond $VERSION already published, skipping"
          else
            cargo publish -p schwarz-precond
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-within:
    name: Publish within
    needs: publish-schwarz-precond
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish within
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "within") | .version')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/within/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "within $VERSION already published, skipping"
          else
            cargo publish -p within
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
