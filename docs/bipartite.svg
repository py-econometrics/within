<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="system-ui, -apple-system, sans-serif">

  <!-- Row labels -->
  <text x="30" y="38" font-size="14" font-weight="bold">Firms</text>
  <text x="30" y="228" font-size="14" font-weight="bold">Workers</text>

  <!-- Firm nodes -->
  <rect x="200" y="20" width="60" height="32" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="230" y="42" font-size="13" text-anchor="middle">F1</text>

  <rect x="480" y="20" width="60" height="32" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="510" y="42" font-size="13" text-anchor="middle">F2</text>

  <!-- Worker nodes -->
  <rect x="80" y="210" width="60" height="32" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="110" y="232" font-size="13" text-anchor="middle">W1</text>

  <rect x="210" y="210" width="60" height="32" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="240" y="232" font-size="13" text-anchor="middle">W2</text>

  <rect x="340" y="210" width="60" height="32" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="370" y="232" font-size="13" text-anchor="middle">W3</text>

  <rect x="470" y="210" width="60" height="32" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="500" y="232" font-size="13" text-anchor="middle">W4</text>

  <rect x="600" y="210" width="60" height="32" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="630" y="232" font-size="13" text-anchor="middle">W5</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>

  <!-- Edges: F1 → W1, W2 (stayers) -->
  <line x1="218" y1="52" x2="115" y2="210" stroke="black" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="148" y="132" font-size="10" text-anchor="end">t=1,2</text>

  <line x1="228" y1="52" x2="238" y2="210" stroke="black" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="222" y="132" font-size="10" text-anchor="end">t=1,2</text>

  <!-- Edges: F1 → W3 (mover t=1), F2 → W3 (mover t=2) -->
  <line x1="242" y1="52" x2="362" y2="210" stroke="black" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="310" y="132" font-size="10" text-anchor="start">t=1</text>

  <line x1="498" y1="52" x2="378" y2="210" stroke="black" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="428" y="132" font-size="10" text-anchor="end">t=2</text>

  <!-- Edges: F2 → W4, W5 (stayers) -->
  <line x1="512" y1="52" x2="502" y2="210" stroke="black" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="518" y="132" font-size="10" text-anchor="start">t=1,2</text>

  <line x1="522" y1="52" x2="625" y2="210" stroke="black" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="590" y="132" font-size="10" text-anchor="start">t=1,2</text>

  <!-- Notes -->
  <text x="80" y="280" font-size="10" font-style="italic">Notes:</text>
  <text x="80" y="295" font-size="10">A worker-firm panel viewed as a bipartite graph G = (W ∪ J, E). The graph is bipartite because its nodes</text>
  <text x="80" y="310" font-size="10">partition into two disjoint sets - workers W = {W1, …, W5} and firms J = {F1, F2} - and every edge connects</text>
  <text x="80" y="325" font-size="10">a node in W to a node in J; no within-set edges exist. The edge set E contains one edge (i, j) for each</text>
  <text x="80" y="340" font-size="10">observed employment relationship: if worker i is observed at firm j in any period, the edge (i, j) ∈ E.</text>
  <text x="80" y="355" font-size="10">Edge labels indicate the periods of observation. W3 is a <tspan font-weight="bold">mover</tspan> (edges to both F1 and F2);</text>
  <text x="80" y="370" font-size="10">all other workers are <tspan font-weight="bold">stayers</tspan> (a single edge each).</text>

</svg>
