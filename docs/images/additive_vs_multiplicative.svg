<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="720" height="300" fill="white" rx="4"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="garr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9"/>
    </marker>
  </defs>

  <!-- LEFT PANEL: Additive -->
  <text x="170" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="600">Additive Schwarz</text>
  <text x="170" y="38" text-anchor="middle" font-size="10" fill="#888">All subdomains solve in parallel from the same residual</text>

  <!-- Residual box -->
  <rect x="120" y="50" width="100" height="30" rx="4" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="170" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">residual r</text>

  <!-- Fan out arrows -->
  <line x1="120" y1="80" x2="55" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="80" x2="170" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="80" x2="285" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Three subdomain boxes -->
  <rect x="10" y="115" width="90" height="50" rx="6" fill="#f8e8e8" stroke="#a66" stroke-width="1.5"/>
  <text x="55" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">W-F</text>
  <text x="55" y="154" text-anchor="middle" font-size="9" fill="#888">solve</text>

  <rect x="125" y="115" width="90" height="50" rx="6" fill="#f8e8e8" stroke="#a66" stroke-width="1.5"/>
  <text x="170" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">W-Y</text>
  <text x="170" y="154" text-anchor="middle" font-size="9" fill="#888">solve</text>

  <rect x="240" y="115" width="90" height="50" rx="6" fill="#f8e8e8" stroke="#a66" stroke-width="1.5"/>
  <text x="285" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">F-Y</text>
  <text x="285" y="154" text-anchor="middle" font-size="9" fill="#888">solve</text>

  <!-- Fan in arrows -->
  <line x1="55" y1="165" x2="120" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="165" x2="170" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="285" y1="165" x2="220" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sum -->
  <circle cx="170" cy="210" r="15" fill="#e8f4e8" stroke="#6a6" stroke-width="2"/>
  <text x="170" y="215" text-anchor="middle" font-size="16" font-weight="bold" fill="#6a6">+</text>

  <!-- Result -->
  <line x1="170" y1="225" x2="170" y2="248" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="110" y="252" width="120" height="28" rx="4" fill="#e8f4e8" stroke="#6a6" stroke-width="1.5"/>
  <text x="170" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">correction z</text>

  <!-- Annotation -->
  <text x="170" y="295" text-anchor="middle" font-size="9" fill="#6a6">Symmetric &#x2192; use with CG</text>

  <!-- Divider -->
  <line x1="360" y1="20" x2="360" y2="290" stroke="#ddd" stroke-width="1"/>

  <!-- RIGHT PANEL: Multiplicative -->
  <text x="540" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="600">Multiplicative Schwarz</text>
  <text x="540" y="38" text-anchor="middle" font-size="10" fill="#888">Each subdomain sees the updated residual from the previous one</text>

  <!-- Step 1 -->
  <rect x="385" y="55" width="70" height="28" rx="4" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="420" y="74" text-anchor="middle" font-size="10" fill="#555">r</text>

  <line x1="420" y1="83" x2="420" y2="98" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="385" y="103" width="70" height="40" rx="6" fill="#f8e8e8" stroke="#a66" stroke-width="1.5"/>
  <text x="420" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">W-F</text>
  <text x="420" y="136" text-anchor="middle" font-size="9" fill="#888">solve</text>

  <!-- Arrow with update -->
  <line x1="455" y1="123" x2="505" y2="123" stroke="#4a9" stroke-width="1.5" marker-end="url(#garr)"/>
  <text x="480" y="116" text-anchor="middle" font-size="8" fill="#4a9">update r</text>

  <!-- Step 2 -->
  <rect x="510" y="55" width="70" height="28" rx="4" fill="#e8f4e8" stroke="#6a6" stroke-width="1.5"/>
  <text x="545" y="74" text-anchor="middle" font-size="10" fill="#555">r&#x2032;</text>

  <line x1="545" y1="83" x2="545" y2="98" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="510" y="103" width="70" height="40" rx="6" fill="#f8e8e8" stroke="#a66" stroke-width="1.5"/>
  <text x="545" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">W-Y</text>
  <text x="545" y="136" text-anchor="middle" font-size="9" fill="#888">solve</text>

  <!-- Arrow with update -->
  <line x1="580" y1="123" x2="630" y2="123" stroke="#4a9" stroke-width="1.5" marker-end="url(#garr)"/>
  <text x="605" y="116" text-anchor="middle" font-size="8" fill="#4a9">update r</text>

  <!-- Step 3 -->
  <rect x="635" y="55" width="70" height="28" rx="4" fill="#e8f4e8" stroke="#6a6" stroke-width="1.5"/>
  <text x="670" y="74" text-anchor="middle" font-size="10" fill="#555">r&#x2033;</text>

  <line x1="670" y1="83" x2="670" y2="98" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="635" y="103" width="70" height="40" rx="6" fill="#f8e8e8" stroke="#a66" stroke-width="1.5"/>
  <text x="670" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">F-Y</text>
  <text x="670" y="136" text-anchor="middle" font-size="9" fill="#888">solve</text>

  <!-- Final result -->
  <line x1="670" y1="143" x2="670" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="600" y="185" width="140" height="28" rx="4" fill="#e8f4e8" stroke="#6a6" stroke-width="1.5"/>
  <text x="670" y="204" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">correction z</text>

  <!-- Key insight -->
  <rect x="400" y="225" width="310" height="50" rx="6" fill="#fff8e0" stroke="#cc8" stroke-width="1"/>
  <text x="555" y="245" text-anchor="middle" font-size="10" fill="#555">Each subdomain benefits from corrections</text>
  <text x="555" y="260" text-anchor="middle" font-size="10" fill="#555">already made &#x2192; generally converges faster</text>

  <!-- Annotation -->
  <text x="555" y="292" text-anchor="middle" font-size="9" fill="#66a">Non-symmetric &#x2192; use with GMRES</text>
</svg>
